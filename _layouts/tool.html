<!DOCTYPE html>
<html lang="{{ page.lang | default: 'en' }}">

{% include head.html %}

<body class="{{ page.body_class | default: 'kc-page' }}" id="{{ page.body_id | default: 'page-top' }}">
    {% include site-navigation.html header_class=page.nav_class brand_class=page.brand_class links_class=page.links_class active=page.active_nav %}

    <main class="{{ page.main_class | default: 'kc-shell' }}">
        {{ content }}
    </main>

    {% include scripts.html %}
    {% if page.script %}
    <script {% if page.script_module %}type="module" {% endif %}src="{{ page.script | relative_url }}"></script>
    {% endif %}
</body>

</html>
