name = "vacation-planner-flight-search"
main = "src/index.ts"
compatibility_date = "2026-05-31"

[observability]
enabled = true
head_sampling_rate = 1

[vars]
FLIGHT_PROVIDER = "serpapi"
CACHE_TTL_SECONDS = "21600"
RATE_LIMIT_MAX_REQUESTS = "10"
RATE_LIMIT_WINDOW_SECONDS = "60"
PROVIDER_DAILY_CALL_LIMIT = "10"
ALLOWED_ORIGINS = "http://127.0.0.1:4000,http://localhost:4000,https://kamleshkc2002.github.io"

[[kv_namespaces]]
binding = "SEARCH_CACHE"
id = "09a0ffbb8819451aa627cd2dd143879c"
preview_id = "8278ce15933b40ad9581157f6b62735f"
